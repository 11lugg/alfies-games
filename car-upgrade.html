<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car Upgrade Racer</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        min-height: 100dvh;
        padding: 12px;
      }

      h1 {
        font-size: 1.8rem;
        margin-bottom: 4px;
        color: #ffd700;
        text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
      }

      .subtitle {
        font-size: 0.8rem;
        color: #888;
        margin-bottom: 12px;
      }

      .stats-bar {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 12px;
        font-size: 0.9rem;
      }

      .stats-bar span {
        color: #aaa;
      }

      .stats-bar strong {
        color: #00e5ff;
      }

      .game-area {
        position: relative;
        width: 100%;
        max-width: 400px;
        height: 200px;
        background: linear-gradient(180deg, #1a1a3a 0%, #2a2a50 40%, #3d3d5c 60%, #4a4a6a 100%);
        border-radius: 12px;
        border: 2px solid #3d3d5c;
        overflow: hidden;
        margin-bottom: 12px;
        transition: background 0.5s;
      }

      /* Theme: City (default/starter) */
      .game-area.theme-city {
        background: linear-gradient(180deg, #1a1a3a 0%, #2a2a50 40%, #3d3d5c 60%, #4a4a6a 100%);
      }

      /* Theme: Highway */
      .game-area.theme-highway {
        background: linear-gradient(180deg, #87ceeb 0%, #b0d8f0 30%, #7ab06a 60%, #5a8a4a 100%);
      }
      .game-area.theme-highway .road {
        background: #2a2a2a;
        border-top: 2px solid #444;
        height: 24px;
      }

      /* Theme: Racing */
      .game-area.theme-racing {
        background: linear-gradient(180deg, #1a0a2e 0%, #2d1b4e 30%, #555 60%, #333 100%);
      }
      .game-area.theme-racing .road {
        background: #222;
        border-top: 3px solid #e94560;
        border-bottom: 3px solid #e94560;
        height: 24px;
      }

      /* Theme: Space */
      .game-area.theme-space {
        background: linear-gradient(180deg, #000011 0%, #0a0a2a 40%, #111133 70%, #0a0a1a 100%);
      }
      .game-area.theme-space .road {
        background: transparent;
        border: none;
        height: 4px;
        border-top: 1px solid rgba(100, 200, 255, 0.3);
      }

      /* Theme: Alien */
      .game-area.theme-alien {
        background: linear-gradient(180deg, #1a003a 0%, #2d0055 30%, #4a0e4a 60%, #2a1a2a 100%);
      }
      .game-area.theme-alien .road {
        background: #1a3a1a;
        border-top: 2px solid #00ff88;
        border-bottom: 2px solid #00ff88;
        height: 20px;
      }

      /* Background scenery layers for parallax depth */
      .bg-mountains {
        position: absolute;
        bottom: 80px;
        left: 0;
        right: 0;
        height: 60px;
        background: repeating-linear-gradient(
          120deg,
          transparent 0px,
          transparent 40px,
          #2a2a50 40px,
          #2a2a50 42px
        );
        opacity: 0;
        pointer-events: none;
      }

      .racing .bg-mountains {
        opacity: 0.4;
      }

      .bg-buildings {
        position: absolute;
        bottom: 50px;
        left: 0;
        right: 0;
        height: 50px;
        display: flex;
        align-items: flex-end;
        pointer-events: none;
      }

      .building {
        position: absolute;
        bottom: 0;
        background: #222240;
        border-radius: 2px 2px 0 0;
        animation: buildingScroll linear infinite;
        opacity: 0;
      }

      .racing .building {
        opacity: 1;
      }

      @keyframes buildingScroll {
        from { transform: translateX(420px); }
        to { transform: translateX(-60px); }
      }

      .bg-trees {
        position: absolute;
        bottom: 44px;
        left: 0;
        right: 0;
        height: 30px;
      }

      .tree {
        position: absolute;
        bottom: 0;
        font-size: 1.2rem;
        animation: treeScroll linear infinite;
        opacity: 0;
      }

      .racing .tree {
        opacity: 1;
      }

      @keyframes treeScroll {
        from { transform: translateX(420px); }
        to { transform: translateX(-30px); }
      }

      .road {
        position: absolute;
        bottom: 30px;
        left: 0;
        right: 0;
        height: 18px;
        background: #333;
        border-top: 2px solid #555;
        border-bottom: 2px solid #444;
      }

      .road-line {
        position: absolute;
        bottom: 37px;
        height: 3px;
        width: 30px;
        background: #ffd700;
        animation: roadScroll linear infinite;
      }

      @keyframes roadScroll {
        from { transform: translateX(420px); }
        to { transform: translateX(-40px); }
      }

      /* Speed lines for fast feeling */
      .speed-line {
        position: absolute;
        height: 1px;
        background: rgba(255, 255, 255, 0.3);
        animation: speedLineScroll linear infinite;
        opacity: 0;
      }

      .racing .speed-line {
        opacity: 1;
      }

      @keyframes speedLineScroll {
        from { transform: translateX(420px); }
        to { transform: translateX(-100px); }
      }

      .car {
        position: absolute;
        bottom: 34px;
        left: 60px;
        font-size: 2.5rem;
        z-index: 10;
        transition: left 2.5s ease-out;
      }

      .car.racing {
        left: 70%;
      }

      /* Exhaust / dust particles */
      .exhaust {
        position: absolute;
        bottom: 0;
        left: -10px;
        pointer-events: none;
        z-index: 5;
      }

      .exhaust-puff {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(200, 200, 200, 0.6);
        animation: puffAnim 0.6s ease-out forwards;
        opacity: 0;
      }

      .exhaust-puff.fire {
        background: rgba(255, 100, 0, 0.8);
        box-shadow: 0 0 6px rgba(255, 50, 0, 0.6);
      }

      .racing .exhaust-puff {
        opacity: 1;
      }

      @keyframes puffAnim {
        0% { transform: translate(0, 0) scale(1); opacity: 0.7; }
        100% { transform: translate(-30px, 0) scale(2); opacity: 0; }
      }

      .speed-display {
        position: absolute;
        top: 12px;
        right: 16px;
        font-size: 2rem;
        font-weight: 900;
        color: #00e5ff;
        text-shadow: 0 0 15px rgba(0, 229, 255, 0.5);
      }

      .speed-display small {
        font-size: 0.8rem;
        font-weight: 400;
        color: #888;
      }

      .race-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 12px 28px;
        border: 2px solid #00e5ff;
        border-radius: 8px;
        background: #1a1a2e;
        color: #00e5ff;
        font-size: 1.1rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
      }

      .race-btn:hover {
        background: #00e5ff;
        color: #1a1a2e;
      }

      .race-btn.hidden {
        display: none;
      }

      .result {
        position: absolute;
        top: 12px;
        left: 16px;
        font-size: 1rem;
        font-weight: 700;
        color: #ffd700;
      }

      .upgrades {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
        width: 100%;
        max-width: 400px;
        margin-bottom: 12px;
      }

      .upgrade-card {
        background: #2d2d44;
        border: 2px solid #3d3d5c;
        border-radius: 10px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s;
      }

      .upgrade-card:hover {
        border-color: #00e5ff;
        transform: translateY(-2px);
      }

      .upgrade-card.maxed {
        opacity: 0.5;
        pointer-events: none;
        border-color: #555;
      }

      .upgrade-card .icon {
        font-size: 1.5rem;
        margin-bottom: 4px;
      }

      .upgrade-card .name {
        font-size: 0.85rem;
        color: #ddd;
        margin-bottom: 4px;
      }

      .upgrade-card .level {
        font-size: 0.75rem;
        color: #888;
        margin-bottom: 6px;
      }

      .upgrade-card .cost {
        font-size: 0.85rem;
        color: #ffd700;
        font-weight: 700;
      }

      .level-bar {
        height: 4px;
        background: #1a1a2e;
        border-radius: 2px;
        margin-top: 6px;
        overflow: hidden;
      }

      .level-bar-fill {
        height: 100%;
        background: #00e5ff;
        border-radius: 2px;
        transition: width 0.3s;
      }

      .garage {
        width: 100%;
        max-width: 400px;
        background: #2d2d44;
        border-radius: 10px;
        border: 2px solid #3d3d5c;
        padding: 12px;
        text-align: center;
      }

      .garage h3 {
        font-size: 0.9rem;
        color: #888;
        margin-bottom: 8px;
      }

      .car-select {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .car-option {
        padding: 8px 12px;
        border: 2px solid #3d3d5c;
        border-radius: 8px;
        background: #1a1a2e;
        cursor: pointer;
        font-size: 1.5rem;
        transition: all 0.2s;
      }

      .car-option.active {
        border-color: #ffd700;
        box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
      }

      .car-option.locked {
        opacity: 0.3;
        position: relative;
      }

      .car-option.locked::after {
        content: "🔒";
        font-size: 0.8rem;
        position: absolute;
        top: -4px;
        right: -4px;
      }
    </style>
  </head>
  <body>
    <h1>🏎️ Car Upgrade Racer</h1>
    <div class="subtitle">Race, earn coins, upgrade, go faster!</div>
    <div class="stats-bar">
      <span>💰 <strong id="coins">0</strong></span>
      <span>🏁 Races: <strong id="races">0</strong></span>
      <span>🏆 Best: <strong id="best-speed">0</strong> km/h</span>
    </div>

    <div class="game-area" id="game-area">
      <div class="bg-mountains"></div>
      <div class="bg-buildings" id="buildings"></div>
      <div class="bg-trees" id="trees"></div>
      <div class="road"></div>
      <div class="car" id="car">🚗<div class="exhaust" id="exhaust"></div></div>
      <div class="speed-display"><span id="speed">0</span> <small>km/h</small></div>
      <div class="result" id="result"></div>
      <button class="race-btn" id="race-btn">🏁 Race!</button>
    </div>

    <div class="upgrades" id="upgrades"></div>

    <div class="garage">
      <h3>🏠 Garage</h3>
      <div class="car-select" id="car-select"></div>
    </div>

    <script>
      const coinsEl = document.getElementById("coins");
      const racesEl = document.getElementById("races");
      const bestSpeedEl = document.getElementById("best-speed");
      const speedEl = document.getElementById("speed");
      const carEl = document.getElementById("car");
      const resultEl = document.getElementById("result");
      const raceBtnEl = document.getElementById("race-btn");
      const upgradesEl = document.getElementById("upgrades");
      const carSelectEl = document.getElementById("car-select");
      const gameAreaEl = document.getElementById("game-area");

      const CARS = [
        { emoji: "🚗", name: "Starter", cost: 0, baseSpeed: 60, theme: "city" },
        { emoji: "🚙", name: "SUV", cost: 100, baseSpeed: 120, theme: "highway" },
        { emoji: "🏎️", name: "Sports Car", cost: 500, baseSpeed: 250, theme: "racing" },
        { emoji: "🚀", name: "Rocket", cost: 2000, baseSpeed: 500, theme: "space" },
        { emoji: "🛸", name: "UFO", cost: 10000, baseSpeed: 1000, theme: "alien" },
      ];

      const UPGRADES = [
        { id: "engine", name: "Engine", icon: "⚙️", maxLevel: 20, baseCost: 20, speedPer: 8 },
        { id: "turbo", name: "Turbo", icon: "💨", maxLevel: 15, baseCost: 40, speedPer: 12 },
        { id: "nitro", name: "Nitro", icon: "🔥", maxLevel: 10, baseCost: 80, speedPer: 20 },
        { id: "tires", name: "Tires", icon: "🛞", maxLevel: 20, baseCost: 15, speedPer: 5 },
      ];

      // Game state
      let state = loadState();

      function defaultState() {
        return {
          coins: 0,
          races: 0,
          bestSpeed: 0,
          currentCar: 0,
          unlockedCars: [true, false, false, false, false],
          upgrades: { engine: 0, turbo: 0, nitro: 0, tires: 0 },
        };
      }

      function loadState() {
        try {
          const saved = localStorage.getItem("car-upgrade-state");
          if (saved) return JSON.parse(saved);
        } catch (e) {}
        return defaultState();
      }

      function saveState() {
        localStorage.setItem("car-upgrade-state", JSON.stringify(state));
      }

      function getMaxSpeed() {
        const car = CARS[state.currentCar];
        let speed = car.baseSpeed;
        for (const up of UPGRADES) {
          speed += state.upgrades[up.id] * up.speedPer;
        }
        return speed;
      }

      function getUpgradeCost(upgrade) {
        const level = state.upgrades[upgrade.id];
        return Math.floor(upgrade.baseCost * Math.pow(1.4, level));
      }

      function updateUI() {
        coinsEl.textContent = state.coins;
        racesEl.textContent = state.races;
        bestSpeedEl.textContent = state.bestSpeed;
        carEl.textContent = CARS[state.currentCar].emoji;
        applyTheme();
        renderUpgrades();
        renderGarage();
      }

      function applyTheme() {
        const theme = CARS[state.currentCar].theme;
        const area = gameAreaEl;

        // Remove old theme classes
        area.classList.remove("theme-city", "theme-highway", "theme-racing", "theme-space", "theme-alien");
        area.classList.add("theme-" + theme);

        // Set car orientation
        // Car emojis face left, so flip them. Rocket faces up, rotate 90deg.
        if (theme === "space") {
          carEl.style.transform = "rotate(45deg)";
        } else {
          carEl.style.transform = "scaleX(-1)";
        }
      }

      function renderUpgrades() {
        upgradesEl.innerHTML = "";
        for (const up of UPGRADES) {
          const level = state.upgrades[up.id];
          const cost = getUpgradeCost(up);
          const maxed = level >= up.maxLevel;

          const card = document.createElement("div");
          card.className = "upgrade-card" + (maxed ? " maxed" : "");
          card.innerHTML = `
            <div class="icon">${up.icon}</div>
            <div class="name">${up.name}</div>
            <div class="level">Lv ${level}/${up.maxLevel}</div>
            <div class="cost">${maxed ? "MAXED" : "💰 " + cost}</div>
            <div class="level-bar"><div class="level-bar-fill" style="width:${(level / up.maxLevel) * 100}%"></div></div>
          `;

          if (!maxed) {
            card.addEventListener("click", () => buyUpgrade(up));
          }

          upgradesEl.appendChild(card);
        }
      }

      function renderGarage() {
        carSelectEl.innerHTML = "";
        CARS.forEach((car, idx) => {
          const btn = document.createElement("div");
          const unlocked = state.unlockedCars[idx];
          btn.className = "car-option" +
            (idx === state.currentCar ? " active" : "") +
            (!unlocked ? " locked" : "");
          btn.textContent = car.emoji;
          btn.title = unlocked ? car.name : `${car.name} — 💰 ${car.cost}`;

          btn.addEventListener("click", () => {
            if (unlocked) {
              state.currentCar = idx;
              saveState();
              updateUI();
            }
          });

          carSelectEl.appendChild(btn);
        });
      }

      function buyUpgrade(upgrade) {
        const cost = getUpgradeCost(upgrade);
        if (state.coins < cost) {
          resultEl.textContent = "Not enough coins!";
          setTimeout(() => { resultEl.textContent = ""; }, 1500);
          return;
        }
        state.coins -= cost;
        state.upgrades[upgrade.id]++;
        saveState();
        checkCarUnlock();
        updateUI();
      }

      function checkCarUnlock() {
        // If all upgrades are maxed, unlock the next car
        const allMaxed = UPGRADES.every(up => state.upgrades[up.id] >= up.maxLevel);
        if (!allMaxed) return;

        const nextCarIdx = state.currentCar + 1;
        if (nextCarIdx < CARS.length && !state.unlockedCars[nextCarIdx]) {
          state.unlockedCars[nextCarIdx] = true;
          state.currentCar = nextCarIdx;
          // Reset upgrades for the new car
          for (const up of UPGRADES) {
            state.upgrades[up.id] = 0;
          }
          saveState();
          resultEl.textContent = `🎉 Unlocked ${CARS[nextCarIdx].name}!`;
          setTimeout(() => { resultEl.textContent = ""; }, 3000);
        }
      }

      // Racing
      let racing = false;

      function startRace() {
        if (racing) return;
        racing = true;
        raceBtnEl.classList.add("hidden");
        carEl.classList.add("racing");
        gameAreaEl.classList.add("racing");
        resultEl.textContent = "";

        const maxSpeed = getMaxSpeed();
        let currentSpeed = 0;
        const targetSpeed = maxSpeed * (0.85 + Math.random() * 0.2);
        const duration = 2500;
        const startTime = Date.now();
        const theme = CARS[state.currentCar].theme;

        // Add road lines
        const lines = [];
        const lineColor = theme === "space" ? "#4fc3f7" : theme === "alien" ? "#00ff88" : "#ffd700";
        for (let i = 0; i < 6; i++) {
          const line = document.createElement("div");
          line.className = "road-line";
          line.style.animationDuration = "3s";
          line.style.animationDelay = (i * 0.5) + "s";
          line.style.background = lineColor;
          gameAreaEl.appendChild(line);
          lines.push(line);
        }

        // Add speed lines (hidden until speed > 40%)
        const speedLines = [];
        for (let i = 0; i < 8; i++) {
          const sl = document.createElement("div");
          sl.className = "speed-line";
          sl.style.top = (20 + Math.random() * 120) + "px";
          sl.style.width = (40 + Math.random() * 60) + "px";
          sl.style.animationDuration = "1s";
          sl.style.animationDelay = (Math.random() * 0.5) + "s";
          sl.style.opacity = "0";
          gameAreaEl.appendChild(sl);
          speedLines.push(sl);
        }

        // Add trees/scenery based on theme
        const treesContainer = document.getElementById("trees");
        treesContainer.innerHTML = "";
        let sceneryEmojis;
        switch (theme) {
          case "highway": sceneryEmojis = ["🏠", "🏢", "🏪", "⛽", "🚏"]; break;
          case "racing": sceneryEmojis = ["🏁", "🔧", "🏟️", "🚧", "🔴"]; break;
          case "space": sceneryEmojis = ["⭐", "✨", "🌟", "💫", "☄️"]; break;
          case "alien": sceneryEmojis = ["👽", "🍄", "🪸", "🌵", "💎"]; break;
          default: sceneryEmojis = ["🌲", "🌳", "🌴"]; break;
        }
        for (let i = 0; i < 5; i++) {
          const tree = document.createElement("div");
          tree.className = "tree";
          tree.textContent = sceneryEmojis[Math.floor(Math.random() * sceneryEmojis.length)];
          tree.style.animationDuration = "2.5s";
          tree.style.animationDelay = (i * 0.5) + "s";
          treesContainer.appendChild(tree);
        }

        // Add buildings/background objects based on theme
        const buildingsContainer = document.getElementById("buildings");
        buildingsContainer.innerHTML = "";
        if (theme === "space") {
          // Stars/planets in background
          for (let i = 0; i < 6; i++) {
            const star = document.createElement("div");
            star.className = "building";
            star.style.width = "4px";
            star.style.height = "4px";
            star.style.borderRadius = "50%";
            star.style.background = "#fff";
            star.style.bottom = (Math.random() * 40) + "px";
            star.style.animationDuration = "6s";
            star.style.animationDelay = (i * 1) + "s";
            buildingsContainer.appendChild(star);
          }
        } else if (theme === "alien") {
          for (let i = 0; i < 4; i++) {
            const bld = document.createElement("div");
            bld.className = "building";
            bld.style.width = (10 + Math.random() * 15) + "px";
            bld.style.height = (15 + Math.random() * 35) + "px";
            bld.style.background = "#3a0060";
            bld.style.borderRadius = "50% 50% 0 0";
            bld.style.animationDuration = "6s";
            bld.style.animationDelay = (i * 1.5) + "s";
            buildingsContainer.appendChild(bld);
          }
        } else {
          for (let i = 0; i < 4; i++) {
            const bld = document.createElement("div");
            bld.className = "building";
            bld.style.width = (15 + Math.random() * 20) + "px";
            bld.style.height = (20 + Math.random() * 30) + "px";
            bld.style.animationDuration = "6s";
            bld.style.animationDelay = (i * 1.5) + "s";
            buildingsContainer.appendChild(bld);
          }
        }

        // Exhaust puffs
        const exhaustEl = document.getElementById("exhaust");
        const useFire = theme === "space";
        let puffInterval = setInterval(() => {
          const puff = document.createElement("div");
          puff.className = "exhaust-puff" + (useFire ? " fire" : "");
          puff.style.top = (Math.random() * 6 - 3) + "px";
          exhaustEl.appendChild(puff);
          setTimeout(() => puff.remove(), 600);
        }, 100);

        function animate() {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          // Linear acceleration based on progress
          currentSpeed = Math.floor(targetSpeed * progress);
          speedEl.textContent = currentSpeed;

          // Animation speed scales linearly with current speed
          // At 0 speed = very slow (5s), at max speed = very fast
          const speedRatio = currentSpeed / targetSpeed; // 0 to 1
          const roadDuration = Math.max(0.2, 3 - (speedRatio * 2.8));
          const treeDuration = Math.max(0.15, 2.5 - (speedRatio * 2.35));
          const buildingDuration = Math.max(0.5, 6 - (speedRatio * 5.5));
          const speedLineDuration = Math.max(0.1, 1 - (speedRatio * 0.9));

          lines.forEach(l => l.style.animationDuration = roadDuration + "s");
          document.querySelectorAll(".tree").forEach(t => t.style.animationDuration = treeDuration + "s");
          document.querySelectorAll(".building").forEach(b => b.style.animationDuration = buildingDuration + "s");
          speedLines.forEach(sl => {
            sl.style.animationDuration = speedLineDuration + "s";
            sl.style.opacity = speedRatio > 0.4 ? "1" : "0";
          });

          if (progress < 1) {
            requestAnimationFrame(animate);
          } else {
            clearInterval(puffInterval);
            finishRace(currentSpeed, [...lines, ...speedLines]);
          }
        }

        requestAnimationFrame(animate);
      }

      function finishRace(finalSpeed, elements) {
        racing = false;
        carEl.classList.remove("racing");
        carEl.style.transition = "none";
        carEl.offsetHeight; // force reflow
        carEl.style.transition = "";
        gameAreaEl.classList.remove("racing");
        raceBtnEl.classList.remove("hidden");

        // Clean up
        elements.forEach(el => el.remove());
        document.getElementById("trees").innerHTML = "";
        document.getElementById("buildings").innerHTML = "";
        document.getElementById("exhaust").innerHTML = "";

        // Earnings based on speed
        const earned = Math.floor(finalSpeed * 0.3) + 5;
        state.coins += earned;
        state.races++;
        if (finalSpeed > state.bestSpeed) {
          state.bestSpeed = finalSpeed;
        }
        saveState();

        resultEl.textContent = `+💰${earned}  |  ${finalSpeed} km/h`;
        setTimeout(() => { resultEl.textContent = ""; }, 3000);

        updateUI();
      }

      raceBtnEl.addEventListener("click", startRace);

      // Init
      updateUI();
      speedEl.textContent = "0";
    </script>
  </body>
</html>
