<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alfie's Games</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #1a1a2e;
        color: #eee;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 2rem;
      }

      ul {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      a {
        display: block;
        padding: 1rem 2rem;
        background: #16213e;
        border: 2px solid #0f3460;
        border-radius: 8px;
        color: #e94560;
        text-decoration: none;
        font-size: 1.25rem;
        transition: background 0.2s, transform 0.2s;
      }

      a:hover {
        background: #0f3460;
        transform: scale(1.03);
      }
    </style>
  </head>
  <body>
    <h1>🎮 Alfie's Games</h1>
    <ul>
      <li><a href="maze-game.html">Man United Maze</a></li>
